name: Pipeline Inteligente

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches:
      - 'feature/*'
    paths:
      - 'src/**'
      - '!src/docs/**'

jobs:
  job_gerador:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Simular build do projeto
        run: |
          mkdir -p saida_build
          echo "Relatório de Testes - $(date)" > saida_build/relatorio1.txt
          echo "Cobertura de código: 85%" >> saida_build/relatorio1.txt
          echo "-----------------------------------" > saida_build/relatorio2.txt
          echo "Erros encontrados: 3" >> saida_build/relatorio2.txt
          echo "Testes passando: 47/50" >> saida_build/relatorio2.txt

      - name: Upload de artefatos
        uses: actions/upload-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: saida_build/

  job_auditoria:
    runs-on: ubuntu-latest
    needs: job_gerador

    steps:
      - name: Download de artefatos
        uses: actions/download-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: relatorios_baixados

      - name: Verificar conteúdo dos relatórios
        run: |
          echo "=== Listando todos os arquivos ==="
          ls -R
          echo ""
          echo "=== Conteúdo do relatorio1.txt ==="
          cat relatorios_baixados/relatorio1.txt
          echo ""
          echo "=== Conteúdo do relatorio2.txt ==="
          cat relatorios_baixados/relatorio2.txt
